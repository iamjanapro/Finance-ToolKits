<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nanogotchi Auditor | Ultimate Final Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f0fdf4;
        }

        .glass-card {
            background: white;
            border-radius: 24px;
            border: 1px solid rgba(34, 197, 94, 0.1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .timeline-dot {
            position: absolute;
            left: 0;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #22c55e;
            top: 6px;
            border: 2px solid white;
            box-shadow: 0 0 0 1px #22c55e;
        }

        .ledger-scroll {
            max-height: 400px;
            overflow-y: auto;
            scrollbar-width: thin;
        }

        input,
        select {
            outline: none;
            transition: all 0.2s;
        }

        input:focus {
            border-color: #22c55e !important;
            background-color: white !important;
        }

        .stat-label {
            font-size: 9px;
            font-weight: 800;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
    </style>
</head>

<body class="p-4 md:p-8 text-slate-800">
    <div id="capture-area" class="max-w-7xl mx-auto p-4">
        <header class="mb-8 flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <div class="text-4xl">🥦</div>
                <div>
                    <h1 class="text-2xl font-800 text-green-900 leading-tight">Nanogotchi Auditor v1</h1>
                    <p class="text-[10px] font-bold text-green-600 uppercase tracking-widest">Ultimate Production
                        Edition</p>
                </div>
            </div>
            <div class="flex flex-wrap justify-center gap-2">
                <button onclick="downloadImage()"
                    class="bg-blue-500 text-white px-5 py-2 rounded-2xl hover:bg-blue-600 text-[10px] font-black uppercase">📸
                    Snapshot</button>
                <button onclick="manualBackup()"
                    class="bg-slate-900 text-white px-5 py-2 rounded-2xl hover:bg-slate-800 text-[10px] font-black uppercase">Export
                    JSON</button>
                <label
                    class="bg-white border border-slate-200 px-5 py-2 rounded-2xl flex items-center cursor-pointer hover:bg-slate-50 text-[10px] font-black uppercase">
                    Import <input type="file" id="importFile" class="hidden" onchange="importData(event)">
                </label>
                <button onclick="clearData()"
                    class="bg-red-50 text-red-500 px-4 py-2 rounded-2xl hover:bg-red-100 text-[10px] font-black uppercase">Reset</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-4 space-y-6">
                <div class="glass-card p-6 border-l-4 border-blue-500">
                    <h2 class="stat-label mb-4">Set Market Price</h2>
                    <div class="space-y-3">
                        <div class="grid grid-cols-2 gap-2">
                            <input type="date" id="price-date"
                                class="text-[10px] p-2 bg-slate-50 border border-slate-100 rounded-lg">
                            <input type="time" id="price-time"
                                class="text-[10px] p-2 bg-slate-50 border border-slate-100 rounded-lg">
                        </div>
                        <div class="flex items-center gap-2">
                            <input type="number" id="market-sell" value="0.00001045" step="0.00000001"
                                class="flex-1 font-black text-xl text-blue-700 p-2 bg-blue-50 rounded-xl">
                            <button onclick="updatePriceHistory()"
                                class="bg-blue-600 text-white px-4 py-3 rounded-xl hover:bg-blue-700 font-bold uppercase text-[10px]">Set</button>
                        </div>
                    </div>
                </div>

                <div class="glass-card p-6 border-b-4 border-green-500 text-center">
                    <div class="space-y-4 mb-6">
                        <div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl">
                            <span class="stat-label">Wallet Broccoli</span>
                            <input type="number" id="current-broccoli" value="0"
                                class="w-32 text-right font-black text-green-600 text-lg bg-transparent"
                                oninput="updateState()">
                        </div>
                        <div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl">
                            <span class="stat-label">Nano Balance</span>
                            <input type="number" id="current-nano-bal" value="0" step="0.00000001"
                                class="w-32 text-right font-black text-blue-600 text-lg bg-transparent"
                                oninput="updateState()">
                        </div>
                    </div>

                    <p id="total-value-nano" class="text-4xl font-black text-slate-900 tracking-tighter">0.00000000</p>
                    <p class="text-[9px] font-bold text-blue-500 uppercase tracking-widest mb-4">Total Portfolio Value
                        (Nano)</p>

                    <div class="grid grid-cols-2 gap-2 pt-4 border-t border-slate-50">
                        <div>
                            <p class="stat-label">Yield/Hr</p>
                            <p id="yield-hr" class="text-xl font-black text-green-600">0.00</p>
                        </div>
                        <div>
                            <p class="stat-label">Daily Rev</p>
                            <p id="rev-day" class="text-xl font-black text-blue-600">0.00</p>
                        </div>
                    </div>
                    <div id="profit-display" class="mt-4 text-[10px] font-black p-3 rounded-xl uppercase">Calculating...
                    </div>
                </div>

                <div class="glass-card p-6">
                    <h2 class="stat-label mb-4">Record Transaction</h2>
                    <div class="space-y-3">
                        <div class="grid grid-cols-2 gap-2">
                            <input type="date" id="tx-date"
                                class="text-[10px] p-2 bg-slate-50 border border-slate-100 rounded-lg">
                            <input type="time" id="tx-time"
                                class="text-[10px] p-2 bg-slate-50 border border-slate-100 rounded-lg">
                        </div>
                        <select id="tx-type" class="w-full text-xs p-3 bg-slate-50 rounded-xl font-bold"
                            onchange="toggleFields()">
                            <option value="Deposit">NANO Deposit</option>
                            <option value="Withdraw">NANO Withdraw</option>
                            <option value="Free">Free NANO (Faucet)</option>
                            <option value="Buy">Broccoli Buy</option>
                            <option value="Sell">Broccoli Sell</option>
                            <option value="Claim">Broccoli Claimed</option>
                            <option value="Feed">Feed Plant (Deduct Broc)</option>
                        </select>
                        <input type="number" id="tx-nano" placeholder="NANO Amount"
                            class="w-full text-xs p-3 bg-slate-50 rounded-xl" oninput="autoUnit()">
                        <div id="extra-tx" class="hidden space-y-2">
                            <input type="number" id="tx-broc" placeholder="Broccoli Quantity"
                                class="w-full text-xs p-3 bg-green-50 rounded-xl" oninput="autoUnit()">
                            <input type="number" id="tx-unit" placeholder="Price per Broccoli"
                                class="w-full text-xs p-3 bg-slate-100 rounded-xl" readonly>
                        </div>
                        <button onclick="recordTx()"
                            class="w-full bg-slate-900 text-white py-3 rounded-xl text-[10px] font-black uppercase hover:bg-slate-800">Add
                            Entry</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="glass-card p-5 h-64">
                        <h2 class="stat-label mb-4">Production Trend</h2><canvas id="yChart"></canvas>
                    </div>
                    <div class="glass-card p-5 h-64">
                        <h2 class="stat-label mb-4">Price History</h2><canvas id="pChart"></canvas>
                    </div>
                </div>
                <div class="glass-card p-6">
                    <h2 class="stat-label mb-6">Transaction Ledger</h2>
                    <div id="ledger-body" class="ledger-scroll relative pl-6 space-y-6 border-l-2 border-slate-50">
                    </div>
                </div>
                <div class="glass-card p-6">
                    <h2 class="stat-label mb-4 text-center">Plant Inventory</h2>
                    <div id="plant-box" class="grid grid-cols-2 md:grid-cols-5 gap-3"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const plants = [
            { id: 'starter', name: 'Starter', stages: 3, timePerStage: 2, yield: 5 },
            { id: 'fast', name: 'Fast', stages: 2, timePerStage: 1.6, yield: 3 },
            { id: 'big', name: 'Big', stages: 4, timePerStage: 1.8, yield: 7 },
            { id: 'golden', name: 'Golden', stages: 5, timePerStage: 2, yield: 12 },
            { id: 'tree', name: 'Tree', stages: 12, timePerStage: 2, yield: 35 }
        ];

        let state = { plants: { starter: 0, fast: 0, big: 0, golden: 0, tree: 0 }, wallet: 0, nanoBal: 0, ledger: [], history: [], prices: [] };
        let yChart, pChart;

        function init() {
            const saved = localStorage.getItem('nanogotchi_audit_v7');
            if (saved) state = JSON.parse(saved);
            const box = document.getElementById('plant-box');
            box.innerHTML = '';
            plants.forEach(p => {
                box.innerHTML += `<div class="p-3 bg-slate-50 rounded-2xl text-center"><p class="stat-label mb-1">${p.name}</p>
                    <input type="number" id="q-${p.id}" value="${state.plants[p.id] || 0}" class="w-full text-center font-black text-green-600 bg-transparent" oninput="updateState()"></div>`;
            });
            document.getElementById('current-broccoli').value = state.wallet;
            document.getElementById('current-nano-bal').value = state.nanoBal || 0;

            const now = new Date();
            ['tx-date', 'price-date'].forEach(id => document.getElementById(id).value = now.toISOString().split('T')[0]);
            ['tx-time', 'price-time'].forEach(id => document.getElementById(id).value = now.toTimeString().slice(0, 5));
            if (state.prices.length > 0) document.getElementById('market-sell').value = state.prices[state.prices.length - 1].p;
            calculate();
        }

        function toggleFields() {
            const type = document.getElementById('tx-type').value;
            const nanoInput = document.getElementById('tx-nano');
            if (type === 'Claim') nanoInput.placeholder = "Broccoli Amount To Add";
            else if (type === 'Feed') nanoInput.placeholder = "Broccoli Amount To Deduct";
            else if (type === 'Free') nanoInput.placeholder = "NANO Amount Received";
            else nanoInput.placeholder = "NANO Amount";
            document.getElementById('extra-tx').classList.toggle('hidden', type === 'Deposit' || type === 'Withdraw' || type === 'Claim' || type === 'Feed' || type === 'Free');
        }

        function recordTx() {
            const type = document.getElementById('tx-type').value;
            const val = parseFloat(document.getElementById('tx-nano').value) || 0;
            const brocVal = parseFloat(document.getElementById('tx-broc').value) || 0;

            let entry = {
                id: Date.now(),
                ts: `${document.getElementById('tx-date').value} ${document.getElementById('tx-time').value}`,
                type: type,
                nano: (type === 'Deposit' || type === 'Withdraw' || type === 'Buy' || type === 'Sell' || type === 'Free') ? val : 0,
                broc: (type === 'Claim' || type === 'Feed') ? val : brocVal,
                unit: parseFloat(document.getElementById('tx-unit').value) || 0
            };

            // Automatic Wallet Adjustments
            if (type === 'Claim') state.wallet += val;
            if (type === 'Feed') state.wallet -= val;
            if (type === 'Deposit' || type === 'Free' || type === 'Sell') state.nanoBal += entry.nano;
            if (type === 'Withdraw' || type === 'Buy') state.nanoBal -= entry.nano;

            state.ledger.push(entry);
            document.getElementById('current-broccoli').value = state.wallet;
            document.getElementById('current-nano-bal').value = state.nanoBal.toFixed(8);
            save();
        }

        function updateState() {
            plants.forEach(p => {
                const val = parseInt(document.getElementById(`q-${p.id}`).value);
                state.plants[p.id] = isNaN(val) ? 0 : val;
            });
            state.wallet = parseFloat(document.getElementById('current-broccoli').value) || 0;
            state.nanoBal = parseFloat(document.getElementById('current-nano-bal').value) || 0;
            save();
        }

        function calculate() {
            const currentPrice = parseFloat(document.getElementById('market-sell').value) || 0;
            let hrYield = 0;
            plants.forEach(p => {
                const count = state.plants[p.id] || 0;
                if (count > 0) hrYield += (count * p.yield) / (p.stages * p.timePerStage);
            });

            let netSpent = 0;
            state.ledger.forEach(tx => {
                if (tx.type === 'Deposit' || tx.type === 'Buy') netSpent += tx.nano;
                if (tx.type === 'Withdraw' || tx.type === 'Sell') netSpent -= tx.nano;
            });

            const currentVal = (state.wallet * currentPrice) + state.nanoBal;
            const profit = currentVal - netSpent;
            const dailyRev = hrYield * 24 * currentPrice;

            document.getElementById('yield-hr').innerText = hrYield.toFixed(3);
            document.getElementById('rev-day').innerText = dailyRev.toFixed(8);
            document.getElementById('total-value-nano').innerText = currentVal.toFixed(8);

            const profEl = document.getElementById('profit-display');
            profEl.innerText = `Net Profit: ${profit.toFixed(8)} Nano`;
            profEl.className = `mt-4 text-[10px] font-black p-3 rounded-xl uppercase ${profit >= 0 ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`;

            const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            if (!state.history.length || state.history[state.history.length - 1].y !== hrYield) {
                state.history.push({ t: now, y: hrYield });
                if (state.history.length > 20) state.history.shift();
            }
            renderLedger();
            renderCharts();
        }

        function renderLedger() {
            const body = document.getElementById('ledger-body');
            body.innerHTML = '';
            [...state.ledger].sort((a, b) => new Date(b.ts) - new Date(a.ts)).forEach(tx => {
                const isPlus = tx.type === 'Deposit' || tx.type === 'Sell' || tx.type === 'Claim' || tx.type === 'Free';
                const isBrocOnly = tx.type === 'Claim' || tx.type === 'Feed';
                body.innerHTML += `<div class="relative pl-4 group">
                    <div class="timeline-dot"></div>
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-[8px] font-black text-slate-300 uppercase">${tx.ts}</p>
                            <p class="text-[10px] font-black text-slate-700 uppercase">${tx.type}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-xs font-black ${isPlus ? 'text-green-600' : 'text-red-500'}">
                                ${isBrocOnly ? (isPlus ? '+' : '-') + tx.broc + ' 🥦' : (isPlus ? '+' : '-') + tx.nano.toFixed(8)}
                            </p>
                            <button onclick="deleteTx(${tx.id})" class="text-[8px] text-red-400 font-bold uppercase opacity-0 group-hover:opacity-100">Delete</button>
                        </div>
                    </div>
                </div>`;
            });
        }

        function save() { localStorage.setItem('nanogotchi_audit_v7', JSON.stringify(state)); calculate(); }
        function downloadImage() { html2canvas(document.getElementById('capture-area'), { backgroundColor: '#f0fdf4', scale: 2 }).then(canvas => { const link = document.createElement('a'); link.download = 'Nanogotchi_Audit.png'; link.href = canvas.toDataURL(); link.click(); }); }
        function updatePriceHistory() { state.prices.push({ ts: `${document.getElementById('price-date').value} ${document.getElementById('price-time').value}`, p: parseFloat(document.getElementById('market-sell').value) || 0 }); save(); }
        function autoUnit() { const n = parseFloat(document.getElementById('tx-nano').value) || 0; const b = parseFloat(document.getElementById('tx-broc').value) || 0; document.getElementById('tx-unit').value = (n > 0 && b > 0) ? (n / b).toFixed(10) : ''; }
        function deleteTx(id) { state.ledger = state.ledger.filter(tx => tx.id !== id); save(); }
        function manualBackup() { const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "Nanogotchi_Backup.json"; a.click(); }
        function importData(e) { const reader = new FileReader(); reader.onload = (event) => { state = JSON.parse(event.target.result); save(); location.reload(); }; reader.readAsText(e.target.files[0]); }
        function clearData() { if (confirm("Clear all?")) { localStorage.removeItem('nanogotchi_audit_v7'); location.reload(); } }
        function renderCharts() {
            const opt = { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false } } };
            if (yChart) yChart.destroy();
            yChart = new Chart(document.getElementById('yChart'), { type: 'line', data: { labels: state.history.map(d => d.t), datasets: [{ data: state.history.map(d => d.y), borderColor: '#22c55e', fill: true, tension: 0.4, backgroundColor: 'rgba(34,197,94,0.1)' }] }, options: opt });
            if (pChart) pChart.destroy();
            pChart = new Chart(document.getElementById('pChart'), { type: 'line', data: { labels: state.prices.map(d => d.ts), datasets: [{ data: state.prices.map(d => d.p), borderColor: '#3b82f6', fill: true, tension: 0.1, backgroundColor: 'rgba(59,130,246,0.1)' }] }, options: opt });
        }
        window.onload = init;
    </script>
</body>

</html>
